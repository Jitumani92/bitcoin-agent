<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | CryptoDaily</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.7;
        }

        /* ── Top Bar ── */
        .top-bar {
            background: #050505;
            border-bottom: 1px solid #1a1a1a;
            padding: 6px 0;
            text-align: center;
            font-size: 0.78em;
            color: #555;
        }

        .top-bar span { margin: 0 20px; }
        .top-bar .live { color: #4caf50; }

        /* ── Header ── */
        header {
            background: #111;
            border-bottom: 3px solid #f7931a;
            padding: 18px 0;
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 2em;
            font-weight: 800;
            color: #f7931a;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .logo span { color: #ffffff; }

        .header-price {
            text-align: right;
            font-size: 0.85em;
        }

        .header-price .btc-price {
            font-size: 1.4em;
            font-weight: 700;
            color: #f7931a;
        }

        .header-price .btc-change {
            font-size: 0.85em;
            color: #4caf50;
        }

        .header-price .btc-change.down { color: #f44336; }

        /* ── Navigation ── */
        nav {
            background: #0d0d0d;
            border-bottom: 1px solid #1e1e1e;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        nav a {
            color: #888;
            text-decoration: none;
            padding: 14px 18px;
            font-size: 0.88em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            display: inline-block;
        }

        nav a:hover {
            color: #f7931a;
            border-bottom-color: #f7931a;
        }

        nav a.active {
            color: #f7931a;
            border-bottom-color: #f7931a;
        }

        /* ── Ad Banner Placeholder ── */
        .ad-banner {
            background: #111;
            border: 1px dashed #222;
            border-radius: 6px;
            text-align: center;
            padding: 16px;
            color: #333;
            font-size: 0.78em;
            margin: 16px auto;
            max-width: 1200px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
        }

        /* ── Container ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ── Footer ── */
        footer {
            background: #050505;
            border-top: 1px solid #1a1a1a;
            padding: 40px 20px 20px;
            margin-top: 60px;
        }

        .footer-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .footer-col h4 {
            color: #f7931a;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 14px;
        }

        .footer-col p {
            color: #444;
            font-size: 0.83em;
            line-height: 1.7;
        }

        .footer-col a {
            display: block;
            color: #555;
            text-decoration: none;
            font-size: 0.83em;
            margin-bottom: 8px;
            transition: color 0.2s;
        }

        .footer-col a:hover { color: #f7931a; }

        .footer-bottom {
            max-width: 1200px;
            margin: 0 auto;
            border-top: 1px solid #1a1a1a;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.78em;
            color: #333;
        }

        /* ── Shared Components ── */
        .section-heading {
            font-size: 1em;
            font-weight: 700;
            color: #f7931a;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #1e1e1e;
            padding-bottom: 10px;
            margin-bottom: 20px;
            margin-top: 30px;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge-up { background: #0d2d0d; color: #4caf50; }
        .badge-down { background: #2d0d0d; color: #f44336; }
        .badge-neutral { background: #1a1a0d; color: #f7931a; }

        .card {
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

        .card:hover { border-color: #f7931a; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .footer-grid { grid-template-columns: 1fr 1fr; }
            .header-inner { flex-direction: column; gap: 10px; text-align: center; }
            nav a { padding: 12px 10px; font-size: 0.78em; }
        }

        @media (max-width: 480px) {
            .footer-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
